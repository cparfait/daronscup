# ──────────────────────────────────────────────────────────────────────────────
# DaronsFC — CI
#
# Déclenchement : push sur `main`
# Pipeline :
#   1. Build les images Docker (runner :latest + migrator :migrate)
#   2. Push sur GitHub Container Registry (ghcr.io)
#
# Le redéploiement est géré côté serveur (Watchtower surveille GHCR et met à
# jour l'image automatiquement) — comme pour les autres apps. Aucun webhook ni
# accès entrant nécessaire.
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — app (runner)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push — migrator
        uses: docker/build-push-action@v5
        with:
          context: .
          target: migrator
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migrate
          cache-from: type=gha
